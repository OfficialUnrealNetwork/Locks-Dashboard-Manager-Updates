name: Build Lock Release Windows Update

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set automatic build version
        shell: pwsh
        run: |
          $version = "1.0." + (1000 + [int]$env:GITHUB_RUN_NUMBER)
          "BUILD_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          node -e "const fs=require('fs'); const p=require('./package.json'); p.version=process.env.BUILD_VERSION; fs.writeFileSync('package.json', JSON.stringify(p,null,2)); const c=require('./update-config.json'); c.githubRepo=process.env.GITHUB_REPOSITORY; fs.writeFileSync('update-config.json', JSON.stringify(c,null,2));"

      - name: Install dependencies
        run: npm install

      - name: Build Windows app
        run: npm run build-win

      - name: Create update ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\Lock Release-win32-x64\*" -DestinationPath "Lock_Release_Windows.zip" -Force

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v$env:BUILD_VERSION"
          gh release create $tag "Lock_Release_Windows.zip" --title "Lock Release $tag" --notes "Automatic Lock Release desktop update from GitHub Actions." --latest
