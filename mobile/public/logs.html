<style>
.entries-actions{
    display:flex;
    gap:8px;
    align-items:center;
    margin-left:auto;
}

.small-btn{
    min-height:38px;
    border:none;
    border-radius:12px;
    padding:9px 11px;
    font-size:12px;
    font-weight:900;
    cursor:pointer;
    white-space:nowrap;
}

.export{
    background:var(--card-2);
    color:var(--text);
    border:1px solid var(--border-strong);
}

.delete{
    background:var(--danger) !important;
    color:#fff !important;
}

.entries-wrap{
    padding-top:14px;
}

.search-box{
    width:100%;
    margin-bottom:12px;
    padding:14px;
    border-radius:14px;
    border:1px solid var(--border);
    background:var(--input);
    color:var(--text);
    outline:none;
}

.search-box::placeholder{
    color:var(--muted);
    opacity:1;
}

.search-box:focus{
    border-color:var(--blue);
    background:var(--input-focus);
    box-shadow:0 0 0 3px rgba(108,92,231,.18);
}

.stats-row{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    margin-bottom:12px;
}

.stat-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:13px 8px;
    text-align:center;
    box-shadow:var(--shadow-soft), var(--inner);
}

.stat-card span{
    display:block;
    color:var(--text);
    font-size:21px;
    line-height:1;
    font-weight:900;
}

.stat-card small{
    display:block;
    margin-top:6px;
    color:var(--muted);
    font-size:11px;
    font-weight:900;
    text-transform:uppercase;
}

.controls-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    padding:12px;
    margin-bottom:14px;
    box-shadow:var(--shadow-soft), var(--inner);
}

.control-label{
    color:var(--muted);
    font-size:11px;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:.5px;
    margin-bottom:8px;
}

.view-tabs{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
    margin-bottom:12px;
}

.view-tab{
    min-height:38px;
    border-radius:12px;
    border:1px solid var(--border-strong);
    background:var(--card-2);
    color:var(--muted);
    font-size:12px;
    font-weight:900;
    cursor:pointer;
}

.view-tab.active{
    background:var(--blue);
    color:#fff;
    border-color:var(--blue-border);
}

.filter-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:9px;
}

.filter-grid select{
    width:100%;
    margin:0;
    padding:12px;
    border-radius:12px;
    border:1px solid var(--border);
    background:var(--input);
    color:var(--text);
    outline:none;
    font-size:13px;
    font-weight:800;
}

.result-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin:0 0 10px;
    color:var(--muted);
    font-size:12px;
    font-weight:900;
}

.clear-filters{
    border:none;
    background:transparent;
    color:var(--blue);
    font-size:12px;
    font-weight:900;
    cursor:pointer;
}

.entry-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    padding:16px;
    margin-bottom:12px;
    box-shadow:var(--shadow-soft), var(--inner);
}


.entry-card.compact{
    padding:13px;
}

.entry-header{
    display:flex;
    justify-content:space-between;
    gap:10px;
    align-items:flex-start;
    margin-bottom:11px;
}

.entry-title{
    color:var(--text);
    font-size:17px;
    font-weight:900;
    line-height:1.15;
}

.entry-card.compact .entry-title{
    font-size:15px;
}

.entry-type{
    color:var(--muted);
    font-size:13px;
    font-weight:800;
    margin-top:4px;
}

.entry-meta{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:8px;
}

.meta-pill{
    background:var(--card-2);
    border:1px solid var(--border);
    color:var(--muted);
    padding:5px 8px;
    border-radius:999px;
    font-size:11px;
    font-weight:900;
}


.entry-grid{
    display:grid;
    gap:7px;
    margin-top:8px;
}

.entry-line{
    color:var(--muted);
    font-size:14px;
    line-height:1.35;
    word-break:break-word;
}

.entry-line strong{
    color:var(--text);
}

.entry-buttons{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-top:14px;
}

.entry-buttons.three{
    grid-template-columns:1fr 1fr 1fr;
}

.entry-buttons button{
    border:none;
    border-radius:13px;
    padding:12px 8px;
    font-size:13px;
    font-weight:900;
    cursor:pointer;
}

.entry-buttons button:active,
.small-btn:active,
.view-tab:active{
    transform:scale(.98);
}


.undo-btn{
    background:var(--card-2);
    color:var(--text);
    border:1px solid var(--border-strong) !important;
}

.edit-btn{
    background:var(--blue);
    color:white;
    border:1px solid var(--blue-border) !important;
}

.delete-one-btn{
    background:var(--danger);
    color:white;
}

.save-edit-btn{
    background:var(--blue);
    color:#fff;
    border:1px solid var(--blue-border) !important;
}

.cancel-edit-btn{
    background:var(--card-2);
    color:var(--text);
    border:1px solid var(--border-strong) !important;
}

.edit-form{
    display:grid;
    gap:10px;
    margin-top:10px;
}

.edit-form label{
    color:var(--muted);
    font-size:13px;
    font-weight:900;
    margin-bottom:-4px;
}

.edit-form input,
.edit-form textarea,
.edit-form select{
    width:100%;
    margin-bottom:0;
    padding:13px;
    border-radius:13px;
    border:1px solid var(--border);
    background:var(--input);
    color:var(--text);
    outline:none;
}

.edit-form input::placeholder,
.edit-form textarea::placeholder{
    color:var(--muted);
    opacity:1;
}

.edit-form input:focus,
.edit-form textarea:focus,
.edit-form select:focus{
    border-color:var(--blue);
    background:var(--input-focus);
    box-shadow:0 0 0 3px rgba(108,92,231,.18);
}

.edit-form textarea{
    min-height:78px;
    resize:vertical;
}

.empty-box{
    padding:30px 18px;
    text-align:center;
    color:var(--muted);
    background:var(--card);
    border:1px dashed var(--border-strong);
    border-radius:18px;
    font-size:14px;
    font-weight:800;
}

.group-title{
    margin:18px 0 9px;
    color:var(--muted);
    font-size:12px;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:.6px;
}

.group-title:first-child{
    margin-top:0;
}



/* Theme dropdown arrows */
select{
    appearance:none;
    -webkit-appearance:none;
    -moz-appearance:none;
    background-color:var(--input) !important;
    background-image:
        linear-gradient(45deg, transparent 50%, var(--muted) 50%),
        linear-gradient(135deg, var(--muted) 50%, transparent 50%) !important;
    background-position:
        calc(100% - 20px) 50%,
        calc(100% - 14px) 50% !important;
    background-size:
        6px 6px,
        6px 6px !important;
    background-repeat:no-repeat !important;
    padding-right:42px !important;
    cursor:pointer;
}

select:focus{
    background-color:var(--input-focus) !important;
    background-image:
        linear-gradient(45deg, transparent 50%, var(--blue) 50%),
        linear-gradient(135deg, var(--blue) 50%, transparent 50%) !important;
}

select::-ms-expand{
    display:none;
}

select option{
    background:var(--card);
    color:var(--text);
}

<script>
const POSSIBLE_KEYS = [
    "saultLocksLogs",
    "saultLocksTrackerLogs",
    "logs",
    "entries",
    "lockLogs",
    "saultLogs",
    "savedEntries"
];

const logList = document.getElementById("logList");
const searchInput = document.getElementById("searchInput");
const totalCount = document.getElementById("totalCount");
const resultCount = document.getElementById("resultCount");
const sortSelect = document.getElementById("sortSelect");
const displaySelect = document.getElementById("displaySelect");
const typeFilter = document.getElementById("typeFilter");
let editingIndex = null;
let pendingDeleteIndex = null;

sortSelect.value = localStorage.getItem("entriesSort") || "newest";

const savedDisplayMode = localStorage.getItem("entriesDisplay") || "detailed";
displaySelect.value = savedDisplayMode === "compact" ? "compact" : "detailed";

function safeParseLocal(value, fallback){
    try{
        return JSON.parse(value) ?? fallback;
    }catch(error){
        return fallback;
    }
}

function isDraftPayloadLocal(value){
    return value &&
        typeof value === "object" &&
        value.data &&
        value.savedAt &&
        String(value.type || "").trim() !== "";
}

function isRealEntryLocal(value){
    if(!value || typeof value !== "object" || Array.isArray(value)){
        return false;
    }

    if(isDraftPayloadLocal(value)){
        return false;
    }

    const typeText = String(value.entryType || value.formType || value.type || "").toLowerCase();

    if(typeText.includes("draft")){
        return false;
    }

    return Boolean(
        value.createdAt ||
        value.id ||
        value.vessel ||
        value.vesselName ||
        value.reverseTime ||
        value.entryTime ||
        value.time ||
        value.reason ||
        value.reverseReason
    );
}

function cleanLogArrayLocal(logs){
    if(!Array.isArray(logs)){
        return [];
    }

    return logs.filter(isRealEntryLocal).map(normalizeEntryOwner);
}

function migrateOldLogsIntoMainKey(){
    const current = cleanLogArrayLocal(
        safeParseLocal(localStorage.getItem("saultLocksLogs"), [])
    );

    if(current.length > 0){
        localStorage.setItem("saultLocksLogs", JSON.stringify(current));
        return;
    }

    for(const key of POSSIBLE_KEYS){
        if(key === "saultLocksLogs") continue;

        const oldLogs = cleanLogArrayLocal(
            safeParseLocal(localStorage.getItem(key), [])
        );

        if(oldLogs.length > 0){
            localStorage.setItem("saultLocksLogs", JSON.stringify(oldLogs));
            return;
        }
    }

    localStorage.setItem("saultLocksLogs", JSON.stringify([]));
}

function getLogsLocal(){
    migrateOldLogsIntoMainKey();

    const logs = safeParseLocal(localStorage.getItem("saultLocksLogs"), []);
    const clean = cleanLogArrayLocal(logs);

    if(Array.isArray(logs) && clean.length !== logs.length){
        localStorage.setItem("saultLocksLogs", JSON.stringify(clean));
    }

    return clean;
}

function saveLogsLocal(logs){
    localStorage.setItem("saultLocksLogs", JSON.stringify(cleanLogArrayLocal(logs)));
}

function escapeHTMLLocal(value){
    return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function formatValue(value){
    if(value === undefined || value === null || String(value).trim() === ""){
        return "N/A";
    }

    return escapeHTMLLocal(value);
}

function getTimeFormatLocal(){
    return localStorage.getItem("timeFormat") || "12";
}

function formatSavedTime(value){
    if(!value) return "N/A";

    const text = String(value).trim();

    if(text.toLowerCase().includes("am") || text.toLowerCase().includes("pm")){
        return escapeHTMLLocal(text);
    }

    const match = text.match(/^(\d{1,2}):(\d{2})/);

    if(!match){
        return escapeHTMLLocal(text);
    }

    const date = new Date();
    date.setHours(Number(match[1]));
    date.setMinutes(Number(match[2]));
    date.setSeconds(0);

    return escapeHTMLLocal(date.toLocaleTimeString([], {
        hour:"2-digit",
        minute:"2-digit",
        hour12:getTimeFormatLocal() === "12"
    }));
}

function getEntryTitle(entry){
    return entry.vessel || 
        entry.vesselName || 
        entry.name || 
        entry.title || 
        entry.type || 
        entry.entryType || 
        "Lock Entry";
}

function getEntryType(entry){
    return entry.entryType || 
        entry.formType || 
        entry.category || 
        entry.type || 
        "Entry";
}

function getEntryTime(entry){
    return entry.time || 
        entry.entryTime || 
        entry.reverseTime || 
        "";
}

function getEntryDate(entry){
    if(entry.date){
        return entry.date;
    }

    if(entry.createdAt){
        return new Date(entry.createdAt).toLocaleDateString();
    }

    return "";
}

function getComparableDate(entry){
    if(entry.createdAt){
        const date = new Date(entry.createdAt);
        if(!Number.isNaN(date.getTime())) return date;
    }

    if(entry.date){
        const date = new Date(entry.date);
        if(!Number.isNaN(date.getTime())) return date;
    }

    return new Date();
}

function getDirection(entry){
    return entry.direction || 
        entry.dir || 
        entry.reverseDir || 
        "";
}

function getRegistration(entry){
    return entry.registration || 
        entry.reg || 
        "";
}

function getPassengers(entry){
    return entry.passengers || 
        entry.passengerCount || 
        entry.pass || 
        "";
}

function getDestination(entry){
    return entry.destination || 
        entry.dest || 
        "";
}

function getReason(entry){
    return entry.reason || 
        entry.reverseReason || 
        "";
}

function cleanNameLocal(value){
    const text = String(value || "").trim();
    if(!text) return "";
    if(/^unknown( user)?$/i.test(text)) return "";
    if(/^n\/?a$/i.test(text)) return "";
    return text;
}

function getActiveProfileNameLocal(){
    if(window.getActiveUserName){
        return window.getActiveUserName();
    }

    const profile = safeParseLocal(localStorage.getItem("ssmCanalDashboard.profile.v1"), {});
    return cleanNameLocal(profile.userName || profile.name || profile.operator) || "Operator";
}

function getActiveDeviceLocal(){
    if(window.getActiveDeviceLabel){
        return window.getActiveDeviceLabel();
    }

    const profile = safeParseLocal(localStorage.getItem("ssmCanalDashboard.profile.v1"), {});
    return cleanNameLocal(profile.deviceLabel || profile.deviceName) || navigator.platform || "This device";
}

function getEntryUser(entry){
    if(window.getLogUserName){
        return window.getLogUserName(entry);
    }

    return cleanNameLocal(entry.createdBy) ||
        cleanNameLocal(entry.createdByName) ||
        cleanNameLocal(entry.addedBy) ||
        cleanNameLocal(entry.userName) ||
        cleanNameLocal(entry.profileName) ||
        cleanNameLocal(entry.operatorName) ||
        cleanNameLocal(entry.operator) ||
        getActiveProfileNameLocal();
}

function getEntryDevice(entry){
    if(window.getLogDeviceLabel){
        return window.getLogDeviceLabel(entry);
    }

    return cleanNameLocal(entry.deviceLabel) ||
        cleanNameLocal(entry.deviceName) ||
        cleanNameLocal(entry.createdDevice) ||
        cleanNameLocal(entry.addedFromDevice) ||
        getActiveDeviceLocal();
}

function normalizeEntryOwner(entry){
    if(!entry || typeof entry !== "object") return entry;
    if(window.normalizeLogProfileFields){
        return window.normalizeLogProfileFields(entry);
    }
    const user = getEntryUser(entry);
    const device = getEntryDevice(entry);
    entry.createdBy = user;
    entry.createdByName = user;
    entry.addedBy = user;
    entry.userName = user;
    entry.profileName = user;
    entry.operatorName = user;
    entry.deviceLabel = device;
    entry.deviceName = device;
    entry.createdDevice = device;
    entry.addedFromDevice = device;
    return entry;
}


function getSearchBlob(entry){
    return [
        getEntryTitle(entry),
        getEntryType(entry),
        getEntryDate(entry),
        getEntryTime(entry),
        getDirection(entry),
        getRegistration(entry),
        getPassengers(entry),
        getDestination(entry),
        entry.homePort,
        getReason(entry),
        getEntryUser(entry),
        getEntryDevice(entry),
        entry.notes,
        entry.canal
    ].join(" ").toLowerCase();
}

function toLocalDateKey(value){
    if(!value) return "";

    if(value instanceof Date && !Number.isNaN(value.getTime())){
        const y = value.getFullYear();
        const m = String(value.getMonth() + 1).padStart(2, "0");
        const d = String(value.getDate()).padStart(2, "0");
        return `${y}-${m}-${d}`;
    }

    const text = String(value).trim();

    if(/^\d{4}-\d{2}-\d{2}/.test(text)){
        return text.slice(0, 10);
    }

    const parsed = new Date(text);

    if(Number.isNaN(parsed.getTime())){
        return "";
    }

    return toLocalDateKey(parsed);
}

function getEntryDateKey(entry){
    return toLocalDateKey(
        entry.date ||
        entry.entryDate ||
        entry.createdAt ||
        entry.savedAt ||
        entry.timestamp ||
        entry.timeStamp ||
        ""
    );
}

function isTodayLog(entry){
    const key = getEntryDateKey(entry);

    // Older saved formats sometimes did not store a date.
    // Those are treated as today's current mobile entries instead of disappearing.
    if(!key) return true;

    return key === toLocalDateKey(new Date());
}

function getTodayLogsLocal(){
    return getLogsLocal().filter(isTodayLog);
}

function updateTypeFilterOptions(logs){
    const currentValue = typeFilter.value || "all";
    const types = [...new Set(logs.map(getEntryType).filter(Boolean))].sort();

    typeFilter.innerHTML = `<option value="all">All Entry Types</option>`;

    types.forEach(type => {
        const option = document.createElement("option");
        option.value = type;
        option.textContent = type;
        typeFilter.appendChild(option);
    });

    if([...typeFilter.options].some(option => option.value === currentValue)){
        typeFilter.value = currentValue;
    }else{
        typeFilter.value = "all";
    }
}


function getFilteredSortedLogs(){
    const logs = getLogsLocal();
    const search = searchInput.value.toLowerCase().trim();
    const selectedType = typeFilter.value;
    const sort = sortSelect.value;

    let items = logs
        .map((entry, index) => ({ entry, index }))
        .filter(item => {
            if(!isTodayLog(item.entry)) return false;
            if(selectedType !== "all" && getEntryType(item.entry) !== selectedType) return false;
            if(search && !getSearchBlob(item.entry).includes(search)) return false;

            return true;
        });

    items.sort((a, b) => {
        if(sort === "oldest"){
            return getComparableDate(a.entry) - getComparableDate(b.entry);
        }

        if(sort === "type"){
            return getEntryType(a.entry).localeCompare(getEntryType(b.entry));
        }

        if(sort === "vessel"){
            return getEntryTitle(a.entry).localeCompare(getEntryTitle(b.entry));
        }

        return getComparableDate(b.entry) - getComparableDate(a.entry);
    });

    return items;
}

function renderLogs(){
    const todayLogs = getTodayLogsLocal();

    updateTypeFilterOptions(todayLogs);
    const items = getFilteredSortedLogs();
    totalCount.textContent = todayLogs.length;

    if(items.length === todayLogs.length){
        resultCount.textContent = `${todayLogs.length} today entries`;
    }else{
        resultCount.textContent = `Showing ${items.length} of ${todayLogs.length} today entries`;
    }

    logList.innerHTML = "";

    if(items.length === 0){
        logList.innerHTML = `
            <div class="empty-box">
                No entries for today match this view.
            </div>
        `;
        return;
    }

    items.forEach(item => {
        if(editingIndex === item.index){
            renderEditCard(item.entry, item.index);
        }else{
            renderViewCard(item.entry, item.index);
        }
    });
}

function renderGroupedLogs(items){
    const groups = {};

    items.forEach(item => {
        const date = getEntryDate(item.entry) || "No Date";

        if(!groups[date]){
            groups[date] = [];
        }

        groups[date].push(item);
    });

    Object.entries(groups).forEach(([date, groupItems]) => {
        const title = document.createElement("div");
        title.className = "group-title";
        title.textContent = date;
        logList.appendChild(title);

        groupItems.forEach(item => {
            if(editingIndex === item.index){
                renderEditCard(item.entry, item.index);
            }else{
                renderViewCard(item.entry, item.index, true);
            }
        });
    });
}

function renderViewCard(entry, index, compactOverride = false){
    const compact = displaySelect.value === "compact" || compactOverride;

    const card = document.createElement("div");
    card.className = "entry-card" + (compact ? " compact" : "");

    const detailGrid = compact ? "" : `
        <div class="entry-grid">
            <div class="entry-line"><strong>Date:</strong> ${formatValue(getEntryDate(entry))}</div>
            <div class="entry-line"><strong>Time:</strong> ${formatSavedTime(getEntryTime(entry))}</div>
            <div class="entry-line"><strong>Canal:</strong> ${formatValue(entry.canal || "Sault Canada Locks")}</div>
            <div class="entry-line"><strong>Direction:</strong> ${formatValue(getDirection(entry))}</div>
            <div class="entry-line"><strong>Registration:</strong> ${formatValue(getRegistration(entry))}</div>
            <div class="entry-line"><strong>Passengers:</strong> ${formatValue(getPassengers(entry))}</div>
            <div class="entry-line"><strong>Destination:</strong> ${formatValue(getDestination(entry))}</div>
            <div class="entry-line"><strong>Home Port:</strong> ${formatValue(entry.homePort)}</div>
            <div class="entry-line"><strong>Added By:</strong> ${formatValue(getEntryUser(entry))}</div>
            <div class="entry-line"><strong>Device:</strong> ${formatValue(getEntryDevice(entry))}</div>
            <div class="entry-line"><strong>Reason:</strong> ${formatValue(getReason(entry))}</div>
            <div class="entry-line"><strong>Notes:</strong> ${formatValue(entry.notes)}</div>

    `;

    card.innerHTML = `
        <div class="entry-header">
            <div>
                <div class="entry-title">${formatValue(getEntryTitle(entry))}</div>
                <div class="entry-type">${formatValue(getEntryType(entry))}</div>

                <div class="entry-meta">
                    <span class="meta-pill">${formatValue(getEntryDate(entry))}</span>
                    <span class="meta-pill">${formatSavedTime(getEntryTime(entry))}</span>
                    <span class="meta-pill">${formatValue(getDirection(entry))}</span>
                    <span class="meta-pill">${formatValue(getEntryUser(entry))}</span>
                </div>
            </div>
        </div>

        ${detailGrid}

        <div class="entry-buttons">
            <button 
                class="edit-btn" 
                type="button" 
                onclick="startEdit(${index})">
                Edit
            </button>

            <button 
                class="delete-one-btn" 
                type="button" 
                onclick="openDeleteConfirm(${index})">
                Delete
            </button>
        </div>
    `;

    logList.appendChild(card);
}

function renderEditCard(entry, index){
    const card = document.createElement("div");
    card.className = "entry-card";

    card.innerHTML = `
        <div class="entry-header">
            <div>
                <div class="entry-title">Edit Entry</div>
                <div class="entry-type">${formatValue(getEntryType(entry))}</div>
            </div>
</div>

        <div class="edit-form">
            <label>Entry Type</label>
            <input id="edit_entryType_${index}" value="${escapeHTMLLocal(getEntryType(entry))}">

            <label>Vessel / Title</label>
            <input id="edit_vessel_${index}" value="${escapeHTMLLocal(getEntryTitle(entry))}">

            <label>Date</label>
            <input id="edit_date_${index}" value="${escapeHTMLLocal(getEntryDate(entry))}">

            <label>Time</label>
            <input 
                id="edit_time_${index}" 
                type="text" 
                placeholder="Example: 03:45 PM or 15:45"
                value="${escapeHTMLLocal(getEntryTime(entry))}">

            <label>Canal</label>
            <input id="edit_canal_${index}" value="${escapeHTMLLocal(entry.canal || "Sault Canada Locks")}">

            <label>Direction</label>
            <input id="edit_direction_${index}" value="${escapeHTMLLocal(getDirection(entry))}">

            <label>Registration</label>
            <input id="edit_registration_${index}" value="${escapeHTMLLocal(getRegistration(entry))}">

            <label>Passenger Count</label>
            <input id="edit_passengers_${index}" value="${escapeHTMLLocal(getPassengers(entry))}">

            <label>Destination</label>
            <input id="edit_destination_${index}" value="${escapeHTMLLocal(getDestination(entry))}">

            <label>Home Port</label>
            <input id="edit_homePort_${index}" value="${escapeHTMLLocal(entry.homePort || "")}">

            <label>Added By</label>
            <input id="edit_user_${index}" value="${escapeHTMLLocal(getEntryUser(entry))}">

            <label>Device</label>
            <input id="edit_device_${index}" value="${escapeHTMLLocal(getEntryDevice(entry))}">

            <label>Reason</label>
            <textarea id="edit_reason_${index}">${escapeHTMLLocal(getReason(entry))}</textarea>

            <textarea id="edit_notes_${index}">${escapeHTMLLocal(entry.notes || "")}</textarea>
        </div>

        <div class="entry-buttons">
            <button 
                class="save-edit-btn" 
                type="button" 
                onclick="saveEdit(${index})">

            </button>

function startEdit(index){
    editingIndex = index;
    renderLogs();
}

function cancelEdit(){
    editingIndex = null;
    renderLogs();
}

function saveLogsLocalOnly(logs){
    localStorage.setItem("saultLocksLogs", JSON.stringify(cleanLogArrayLocal(logs)));
}

function syncEditedLogToDashboard(entry){
    if(!entry || !window.mobileLinkSync || !window.mobileLinkSync.isLinked || !window.mobileLinkSync.isLinked()){
        return;
    }

    if(typeof window.mobileLinkSync.pushEntry === "function"){
        window.mobileLinkSync.pushEntry(entry, {silent:true, timeoutMs:7000})
            .then(() => renderLogs())
            .catch(() => {});
    }
}

function syncDeletedLogToDashboard(entry){
    if(!entry || !window.mobileLinkSync || !window.mobileLinkSync.isLinked || !window.mobileLinkSync.isLinked()){
        return Promise.resolve(null);
    }

    if(typeof window.mobileLinkSync.cancelQueuedSync === "function"){
        window.mobileLinkSync.cancelQueuedSync();
    }

    if(typeof window.mobileLinkSync.markDeletedLocal === "function"){
        window.mobileLinkSync.markDeletedLocal(entry);
    }

    if(typeof window.mobileLinkSync.deleteEntry === "function"){
        return window.mobileLinkSync.deleteEntry(entry, {silent:false, timeoutMs:9000})
            .then(out => { renderLogs(); return out; })
            .catch(error => {
                console.warn("Mobile delete did not reach dashboard", error);
                return null;
            });
    }

    return Promise.resolve(null);
}

window.addEventListener("ssm-mobile-logs-synced", function(){
    editingIndex = null;
    renderLogs();
});

async function saveEdit(index){
    const logs = getLogsLocal();

    if(!logs[index]){
        return;
    }

    const oldEntry = logs[index];

    const entryType = document.getElementById(`edit_entryType_${index}`).value.trim();
    const vessel = document.getElementById(`edit_vessel_${index}`).value.trim();
    const date = document.getElementById(`edit_date_${index}`).value.trim();
    const time = document.getElementById(`edit_time_${index}`).value.trim();
    const canal = document.getElementById(`edit_canal_${index}`).value.trim();
    const direction = document.getElementById(`edit_direction_${index}`).value.trim();
    const registration = document.getElementById(`edit_registration_${index}`).value.trim();
    const passengers = document.getElementById(`edit_passengers_${index}`).value.trim();
    const destination = document.getElementById(`edit_destination_${index}`).value.trim();
    const homePort = document.getElementById(`edit_homePort_${index}`).value.trim();
    const addedBy = document.getElementById(`edit_user_${index}`).value.trim();
    const deviceLabel = document.getElementById(`edit_device_${index}`).value.trim();
    const reason = document.getElementById(`edit_reason_${index}`).value.trim();
    const notes = document.getElementById(`edit_notes_${index}`).value.trim();

    logs[index] = {
        ...oldEntry,

        entryType:entryType,
        formType:entryType,
        type:entryType,

        vessel:vessel,
        vesselName:vessel,
        title:vessel,

        date:date,
        entryDate:date,

        time:time,
        entryTime:time,
        reverseTime:time,

        canal:canal,

        direction:direction,
        dir:direction,
        reverseDir:direction,

        registration:registration,
        reg:registration,

        passengers:passengers,
        passengerCount:passengers,
        pass:passengers,

        destination:destination,
        dest:destination,

        homePort:homePort,

        createdBy:addedBy || getActiveProfileNameLocal(),
        createdByName:addedBy || getActiveProfileNameLocal(),
        addedBy:addedBy || getActiveProfileNameLocal(),
        userName:addedBy || getActiveProfileNameLocal(),
        profileName:addedBy || getActiveProfileNameLocal(),
        operatorName:addedBy || getActiveProfileNameLocal(),
        deviceLabel:deviceLabel || getActiveDeviceLocal(),
        deviceName:deviceLabel || getActiveDeviceLocal(),
        createdDevice:deviceLabel || getActiveDeviceLocal(),
        addedFromDevice:deviceLabel || getActiveDeviceLocal(),

        reason:reason,
        reverseReason:reason,

        notes:notes,

        editedAt:new Date().toISOString()
    };

    saveLogsLocal(logs);
    syncEditedLogToDashboard(logs[index]);

    editingIndex = null;
    renderLogs();
}

function openDeleteConfirm(index){
    const logs = getLogsLocal();

    if(!logs[index]){
        return;
    }

    pendingDeleteIndex = index;

    const entry = logs[index];
    const backdrop = document.getElementById("deleteConfirmBackdrop");
    const name = document.getElementById("deleteConfirmName");
    const meta = document.getElementById("deleteConfirmMeta");
    const button = document.getElementById("deleteConfirmButton");

    if(name){
        name.textContent = getEntryTitle(entry) || "Entry";
    }

    if(meta){
        const parts = [
            getEntryType(entry),
            getEntryDate(entry),
            formatSavedTime(getEntryTime(entry)).replace(/&amp;/g, "&")
        ].filter(value => value && value !== "N/A");

        meta.textContent = parts.length ? parts.join(" • ") : "Ready to delete";
    }

    if(button){
        button.disabled = false;
        button.textContent = "Delete";
    }

    if(backdrop){
        backdrop.classList.add("show");
        document.body.classList.add("delete-confirm-lock");
    }
}

function closeDeleteConfirm(){
    const backdrop = document.getElementById("deleteConfirmBackdrop");
    const button = document.getElementById("deleteConfirmButton");

    pendingDeleteIndex = null;

    if(backdrop){
        backdrop.classList.remove("show");
    }

    if(button){
        button.disabled = false;
        button.textContent = "Delete";
    }

    document.body.classList.remove("delete-confirm-lock");
}

function handleDeleteBackdropClick(event){
    if(event.target && event.target.id === "deleteConfirmBackdrop"){
        closeDeleteConfirm();
    }
}

async function confirmDeleteLog(){
    if(pendingDeleteIndex === null){
        return;
    }

    const button = document.getElementById("deleteConfirmButton");
    const index = pendingDeleteIndex;

    pendingDeleteIndex = null;

    if(button){
        button.disabled = true;
        button.textContent = "Deleting...";
    }

    await deleteLog(index);
    closeDeleteConfirm();
}

async function deleteLog(index){
    const logs = getLogsLocal();

    if(!logs[index]){
        return;
    }

    const removedEntry = logs[index];
    logs.splice(index, 1);
    saveLogsLocalOnly(logs);

    if(editingIndex === index){
        editingIndex = null;
    }else if(editingIndex !== null && editingIndex > index){
        editingIndex -= 1;
    }

    renderLogs();
    await syncDeletedLogToDashboard(removedEntry);
}

function exportLogs(){
    const logs = getTodayLogsLocal();

    if(logs.length === 0){
        return;
    }

    const data = JSON.stringify(logs, null, 2);
    const blob = new Blob([data], { type:"application/json" });
    const url = URL.createObjectURL(blob);

    const link = document.createElement("a");
    link.href = url;
    link.download = `sault-locks-today-${toLocalDateKey(new Date())}.json`;
    link.click();

    URL.revokeObjectURL(url);
}

function clearFilters(){
    searchInput.value = "";
    sortSelect.value = "newest";
    displaySelect.value = "detailed";
    typeFilter.value = "all";

    localStorage.setItem("entriesSort", sortSelect.value);
    localStorage.setItem("entriesDisplay", displaySelect.value);
    localStorage.removeItem("entriesDateFilter");

    editingIndex = null;
    renderLogs();
}

searchInput.addEventListener("input", function(){
    editingIndex = null;
    renderLogs();
});

sortSelect.addEventListener("change", function(){
    localStorage.setItem("entriesSort", sortSelect.value);
    editingIndex = null;
    renderLogs();
});

displaySelect.addEventListener("change", function(){
    localStorage.setItem("entriesDisplay", displaySelect.value);
    editingIndex = null;
    renderLogs();
});

typeFilter.addEventListener("change", function(){
    editingIndex = null;
    renderLogs();
});




document.addEventListener("keydown", function(event){
    if(event.key === "Escape"){
        closeDeleteConfirm();
    }
});

renderLogs();

if ("serviceWorker" in navigator && location.protocol !== "file:") {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch(()=>{});
    });
}
</script>
