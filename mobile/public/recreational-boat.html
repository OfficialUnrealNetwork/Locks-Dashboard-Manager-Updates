<body>

<div class="page">

    <header class="entry-app-header" aria-label="Recreational Boat page header">
        <a class="entry-header-btn" href="index.html" aria-label="Back">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15 18 9 12l6-6"></path>
            </svg>
        </a>

            <small>New Entry</small>
        </div>

        <span class="entry-header-spacer" aria-hidden="true"></span>
    </header>

    <form class="form" id="entryForm">

        <label>Vessel Preset / Vessel Name</label>

                aria-label="Open vessel presets">

        </div>

            type="text" 
            placeholder="Enter Registration">

        <label>Canal</label>

<div class="popup-overlay" id="missingPopup">
    <div class="popup-box">
        <h3>Missing Information</h3>
        <p>Some fields are not filled out. Are you sure you want to continue?</p>

        <div class="missing-list" id="missingList"></div>

            <button class="cancel-btn" type="button" id="cancelSubmit">

            </button>

<script src="assets/app.js?v=20260707pairpage2"></script>

<script>
function getTimeSetting(){
    return localStorage.getItem("timeFormat") || "12";
}

function formatDisplayTime(date){
    return date.toLocaleTimeString([], {
        hour:"2-digit",
        minute:"2-digit",
        hour12:getTimeSetting() === "12"
    });
}

function setCurrentTime(force){
    const input = document.getElementById("entryTime");
    if(!input) return;
    if(force !== true && String(input.value || "").trim()) return;
    const now = new Date();
    input.value = formatDisplayTime(now);
    input.dispatchEvent(new Event("input", { bubbles:true }));
    input.dispatchEvent(new Event("change", { bubbles:true }));
}

function cleanManualTime(value){
    return String(value || "").trim();
}

setCurrentTime();
const dirSelect = document.getElementById("dir");

dirSelect.addEventListener("change", function(){
    if(this.value === ""){
        this.classList.add("placeholder");
    }else{
        this.classList.remove("placeholder");
    }
});

const form = document.getElementById("entryForm");
const popup = document.getElementById("missingPopup");
const missingList = document.getElementById("missingList");
const cancelSubmit = document.getElementById("cancelSubmit");
const continueSubmit = document.getElementById("continueSubmit");

let allowBypassSubmit = false;

function getMissingFields(){
    const requiredFields = [
        {
            id:"reg",
            name:"Registration"
        },
        {
            id:"dir",
            name:"Direction"
        },
        {
            id:"pass",
            name:"Passenger Count"
        },
        {
            id:"dest",
            name:"Destination"
        },
        {
            id:"homePort",
            name:"Home Port"
        },
        {
            id:"entryTime",
            name:"Time"
        }
    ];

    return requiredFields.filter(field => {
        const el = document.getElementById(field.id);
        return !String(el.value || "").trim();
    });
}

function showMissingPopup(missing){
    missingList.innerHTML = "";

    missing.forEach(field => {
        const item = document.createElement("div");
        item.textContent = "• " + field.name;
        missingList.appendChild(item);
    });

    popup.classList.add("active");
}

function hideMissingPopup(){
    popup.classList.remove("active");
}

form.addEventListener("submit", function(e){
    if(allowBypassSubmit){
        return;
    }

    if(window.shouldConfirmBeforeSave && !window.shouldConfirmBeforeSave()){
        return;
    }

    const missing = getMissingFields();

    if(missing.length > 0){
        e.preventDefault();
        e.stopImmediatePropagation();

        showMissingPopup(missing);
        return false;
    }
}, true);

cancelSubmit.addEventListener("click", function(){
    hideMissingPopup();
});

continueSubmit.addEventListener("click", function(){
    allowBypassSubmit = true;
    hideMissingPopup();
    form.requestSubmit();
});

popup.addEventListener("click", function(e){
    if(e.target === popup){
        hideMissingPopup();
    }
});


// Safe value reader for this page. Some older app.js versions expected #vessel to be a <select>,
// but this page uses a searchable text input so manual vessel names still save correctly.
window.getRealSelectValue = function(selectId, manualId){
    const field = document.getElementById(selectId);
    const manual = document.getElementById(manualId);

    if(!field) return "";

    if(field.tagName !== "SELECT"){
        return String(field.value || "").trim();
    }

    const selectedOption = field.options[field.selectedIndex];

    if(selectedOption && selectedOption.dataset.manual === "true" && manual){
        return String(manual.value || "").trim() || "Other";
    }

    return String(field.value || "").trim();
};


function initRecreationalBoatPresetDropdown(){
    const input = document.getElementById("vessel");
    const reg = document.getElementById("reg");
    const homePort = document.getElementById("homePort");
    const dest = document.getElementById("dest");
    const combo = document.getElementById("rbPresetCombo");
    const toggle = document.getElementById("rbPresetToggle");
    const menu = document.getElementById("rbPresetMenu");
    const hint = document.getElementById("rbPresetHint");

    if(!input || !combo || !toggle || !menu) return;
    if(input.dataset.pageRbPresetReady === "true") return;

    input.dataset.pageRbPresetReady = "true";
    input.dataset.rbPresetReady = "true";
    input.removeAttribute("list");
    input.setAttribute("autocomplete", "off");

    let activeIndex = -1;
    let cachedPresets = [];

    function safeParse(value, fallback){
        try{
            const parsed = JSON.parse(value);
            return parsed === undefined || parsed === null ? fallback : parsed;
        }catch(e){
            return fallback;
        }
    }

    function clean(value){
        return String(value === undefined || value === null ? "" : value).trim();
    }

    function escapeHtml(value){
        return clean(value).replace(/[&<>"]/g, function(ch){
            return {
                "&":"&amp;",
                "<":"&lt;",
                ">":"&gt;",
                "\"":"&quot;"
            }[ch];
        });
    }

    function getPresetHomePort(preset){
        return clean(
            preset.homePort ||
            preset.homeport ||
            preset.home_port ||
            preset.port ||
            [preset.city, preset.state, preset.country].filter(Boolean).join(", ")
        );
    }

    function normalizePreset(item, source){
        if(typeof item === "string"){
            return {
                name:clean(item),
                reg:"",
                homePort:"",
                owner:"",
                source:source || "Preset"
            };
        }

        if(!item || typeof item !== "object") return null;

        const name = clean(item.name || item.vessel || item.vesselName || item.boatName || item.owner);
        if(!name) return null;

        return {
            name:name,
            reg:clean(item.registration || item.reg || item.vesselReg || item.vesselRegistration || item.canalReg || item.canal),
            homePort:getPresetHomePort(item),
            destination:clean(item.destination || item.dest),
            owner:clean(item.owner),
            source:source || "Preset"
        };
    }

    function addList(target, list, source){
        if(!Array.isArray(list)) return;
        list.forEach(item => {
            const preset = normalizePreset(item, source);
            if(preset) target.push(preset);
        });
    }

    function addObjectMap(target, obj, source){
        if(!obj || typeof obj !== "object" || Array.isArray(obj)) return;
        Object.entries(obj).forEach(([name, value]) => {
            if(value && typeof value === "object"){
                target.push(normalizePreset({ name, ...value }, source));
            }else{
                target.push(normalizePreset({ name, reg:value }, source));
            }
        });
    }

    function readLocalPresetGroups(){
        const groups = [];

        try{
            if(typeof getVesselPresets === "function"){
                groups.push(getVesselPresets("RB"));
            }
        }catch(e){}

        try{
            if(typeof vesselPresetGroups !== "undefined" && vesselPresetGroups && Array.isArray(vesselPresetGroups.RB)){
                groups.push(vesselPresetGroups.RB);
            }
        }catch(e){}

        const byType = safeParse(localStorage.getItem("ssmCanalDashboard.entryPresets.byType"), null);
        if(byType && Array.isArray(byType.RB)) groups.push(byType.RB);

        const oldPresets = safeParse(localStorage.getItem("ssmCanalDashboard.entryPresets"), null);
        if(oldPresets){
            if(Array.isArray(oldPresets.RB)) groups.push(oldPresets.RB);
            else if(!Array.isArray(oldPresets)) groups.push(Object.entries(oldPresets).map(([name, reg]) => ({ name, reg })));
        }

        const dashboard = safeParse(localStorage.getItem("ssmCanalDashboard.v1"), null);
        if(dashboard){
            if(dashboard.entryPresets && Array.isArray(dashboard.entryPresets.RB)) groups.push(dashboard.entryPresets.RB);
            const registryRB = Array.isArray(dashboard.registry) ? dashboard.registry.filter(item => clean(item.type).toLowerCase() === "rb" || clean(item.vesselType).toLowerCase() === "rb") : [];
            groups.push(registryRB);
        }

        return groups;
    }

    function readLogPresets(){
        const logs = [];
        const keys = ["saultLocksLogs", "ssmCanalDashboard.logs", "ssmCanalDashboard.mobileLogs"];

        keys.forEach(key => {
            const value = safeParse(localStorage.getItem(key), []);
            if(Array.isArray(value)) logs.push(...value);
        });

        const dashboard = safeParse(localStorage.getItem("ssmCanalDashboard.v1"), null);
        if(dashboard && Array.isArray(dashboard.traffic)) logs.push(...dashboard.traffic);

        return logs.filter(entry => {
            const type = clean(entry.entryType || entry.formType || entry.type).toLowerCase();
            return type.includes("recreational") || type === "rb" || type.includes("returning");
        });
    }

    function uniquePresets(list){
        const map = new Map();

        list.forEach(preset => {
            if(!preset || !preset.name) return;
            const key = (preset.name + "|" + preset.reg).toLowerCase();
            const current = map.get(key) || {};
            map.set(key, {
                ...current,
                ...preset,
                reg:current.reg || preset.reg,
                homePort:current.homePort || preset.homePort,
                destination:current.destination || preset.destination,
                owner:current.owner || preset.owner
            });
        });

        return Array.from(map.values()).sort((a,b) => a.name.localeCompare(b.name));
    }

    function readPresets(){
        const output = [];
        readLocalPresetGroups().forEach(group => addList(output, group, "Dashboard preset"));
        addList(output, readLogPresets(), "Recent boat");

        return uniquePresets(output);
    }

    function refreshPresets(){
        cachedPresets = readPresets();

        if(hint){
            hint.textContent = cachedPresets.length
                ? `${cachedPresets.length} recreational preset${cachedPresets.length === 1 ? "" : "s"} available. Search by vessel, registration, owner, or home port.`
                : "No recreational presets found yet. You can still type the vessel name manually.";
        }
    }

    async function pullFreshPresets(){
        try{
            const response = await fetch("/api/presets", { cache:"no-store" });
            if(!response.ok) return;
            const payload = await response.json();
            if(payload && payload.entryPresets){
                localStorage.setItem("ssmCanalDashboard.entryPresets.byType", JSON.stringify(payload.entryPresets));
                refreshPresets();
                if(menu.classList.contains("open")) renderMenu();
            }
        }catch(e){}
    }

    function filteredPresets(){
        const query = clean(input.value).toLowerCase();

        if(!query) return cachedPresets.slice(0, 120);

        return cachedPresets.filter(preset => {
            const text = [
                preset.name,
                preset.reg,
                preset.owner,
                preset.homePort,
                preset.destination
            ].join(" ").toLowerCase();

            return text.includes(query);
        }).slice(0, 120);
    }

    function setFieldValue(field, value, force){
        if(!field) return;
        const next = clean(value);
        if(!next) return;
        if(force !== true && clean(field.value)) return;

        field.value = next;
        field.dispatchEvent(new Event("input", { bubbles:true }));
        field.dispatchEvent(new Event("change", { bubbles:true }));
    }

    function selectPreset(preset){
        if(!preset) return;

        input.value = preset.name;
        input.dispatchEvent(new Event("input", { bubbles:true }));

        setFieldValue(reg, preset.reg, true);
        setFieldValue(homePort, preset.homePort, true);
        setFieldValue(dest, preset.destination, false);

        input.dispatchEvent(new Event("change", { bubbles:true }));
        closeMenu();

        setTimeout(() => {
            input.focus();
            try{
                input.setSelectionRange(input.value.length, input.value.length);
            }catch(e){}
        }, 0);
    }

    function renderMenu(){
        refreshPresets();

        const items = filteredPresets();
        menu.innerHTML = "";
        activeIndex = -1;

        if(!items.length){
            menu.innerHTML = `<div class="rb-preset-empty">No matching presets. Keep typing to enter a new boat manually.</div>`;
            return;
        }

        items.forEach((preset, index) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "rb-preset-option";
            button.dataset.index = String(index);
            button.setAttribute("role", "option");

            const meta = [
                preset.reg || "No registration",
                preset.homePort,
                preset.owner
            ].filter(Boolean).join(" • ");

            button.innerHTML = `<strong>${escapeHtml(preset.name)}</strong><span>${escapeHtml(meta)}</span>`;

            button.addEventListener("mousedown", function(e){
                e.preventDefault();
                selectPreset(preset);
            });

            menu.appendChild(button);
        });
    }

    function openMenu(){
        renderMenu();
        menu.classList.add("open");
        input.setAttribute("aria-expanded", "true");
    }

    function closeMenu(){
        menu.classList.remove("open");
        input.setAttribute("aria-expanded", "false");
        activeIndex = -1;
    }

    function updateActive(){
        const buttons = Array.from(menu.querySelectorAll(".rb-preset-option"));
        buttons.forEach(button => button.classList.remove("active"));

        if(buttons[activeIndex]){
            buttons[activeIndex].classList.add("active");
            buttons[activeIndex].scrollIntoView({ block:"nearest" });
        }
    }

    input.setAttribute("aria-expanded", "false");
    input.setAttribute("aria-controls", "rbPresetMenu");

    input.addEventListener("focus", openMenu);
    input.addEventListener("input", openMenu);

    toggle.addEventListener("click", function(){
        if(menu.classList.contains("open")){
            closeMenu();
        }else{
            input.focus();
            openMenu();
        }
    });

    input.addEventListener("keydown", function(e){
        if(!menu.classList.contains("open")) return;

        const buttons = Array.from(menu.querySelectorAll(".rb-preset-option"));

        if(e.key === "ArrowDown"){
            e.preventDefault();
            activeIndex = Math.min(activeIndex + 1, buttons.length - 1);
            updateActive();
        }

        if(e.key === "ArrowUp"){
            e.preventDefault();
            activeIndex = Math.max(activeIndex - 1, 0);
            updateActive();
        }

        if(e.key === "Enter" && activeIndex >= 0){
            e.preventDefault();
            const items = filteredPresets();
            if(items[activeIndex]) selectPreset(items[activeIndex]);
        }

        if(e.key === "Escape"){
            closeMenu();
        }
    });

    document.addEventListener("mousedown", function(e){
        if(!combo.contains(e.target)) closeMenu();
    });

    refreshPresets();
    pullFreshPresets();
}

setupNormalForm("Recreational Boat");
initRecreationalBoatPresetDropdown();

if ("serviceWorker" in navigator && location.protocol !== "file:") {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch(()=>{});
    });
}
</script>
